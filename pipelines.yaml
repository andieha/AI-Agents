pipeline:
  name: Daily Report Pipeline
  path: Execution/Daily-Sprint13
  trigger: "Start the Execution"

google_drive:
  root:
    name: "100 AI Agents"
    id: 1AAGGDZsJLGBLv3MgmOSMiJBkCthIwTId
  folders:
    execution_log:
      name: Execution Log
      id: 1fcIrmGBV1vO-KiD3vZDFZEx4N_grS80D
    memory:
      name: AI Agents Memory
      id: 1TVTUon1jtQDNkH7OiANUvsTe015MNfec
    email:
      name: Email
      id: 12LVIpKZbFdWKltJOzclFtakeUqFsHqrn
      files:
        whitelist:
          name: Whitelist
          id: 1vs72H-ZCHILLXYu7XhX6dRmeNN57V0252UPtmvG0578
    reports:
      name: Reports15
      id: 1aa0mOKOM_n_z2VkpU8r-Q7HgoVfdD-p_

notion:
  cache:
    name: Cache
    parent: Admin
    data_source_id: 9b61968e-b3f5-4765-acde-f74ab98d109a
    slots: 31
    key: day-of-month

steps:

  - step: 0
    name: Setup
    action: >
      Create folder "Collection – [Month DD, YYYY]" inside Reports15.
      Note the Collection folder ID — all Step 1 agents save inside it.

  - step: 1
    name: Collect
    mode: parallel
    agents:
      - file: sub/collecting-news.md
        name: collecting-news
        description: Fetch AI, Global, and Swedish news (last 24h) — 3 tasks in parallel
        outputs:
          - "🤖 AI News – [date]"
          - "🌍 Global News – [date]"
          - "🇸🇪 Swedish News – [date]"

      - file: sub/field-monitor.md
        name: field-monitor
        description: 7-day sweep of AI Agents & Tool Use developments
        output: "📡 Field Monitor Digest – Week [N], [YEAR]"

      - file: sub/email-summary.md
        name: email-summary
        description: Fetch Gmail, classify, draft replies, log to Notion — run 4 sub-tasks sequentially
        output: "📋 Email Summary – [date]"
        note: No background sub-agents; retry each sub-task up to 3× on failure

      - file: sub/daily-brief.md
        name: daily-brief
        description: 48h sweep — markets, AI & technology, geopolitics, strategic signals
        output: "📰 Daily Brief – [date]"

      - file: sub/newsletter-digest.md
        name: newsletter-digest
        description: Expand newsletter emails received today into full prose
        output: "📨 Newsletter Digest – [date] (Expanded)"

      - file: sub/investment-signals.md
        name: investment-signals
        description: Search AI/robotics news, assess portfolio implications, log signals
        output: "Investment Signal – [desc] ([date])"
        shared_storage: AI Agents Memory (id: 1TVTUon1jtQDNkH7OiANUvsTe015MNfec)

  - step: 2
    name: Clean
    mode: sequential
    agents:
      - file: sub/clean.md
        name: clean
        description: Audit Reports15 — list Collection folders older than 30 days

  - step: 3
    name: Aggregate and Convert
    mode: sequential
    agents:
      - file: sub/aggregated-report.md
        name: aggregated-report
        description: Merge all Step 1 docs into a single themed report; note the saved file ID
        output: "📊 Aggregated Report – [date]"

      - file: sub/tts-convert.md
        name: tts-convert
        description: Convert aggregated report to plain-text TTS version (max 10,000 chars)
        input: file ID of aggregated report from previous agent
        output: "📊 Aggregated Report – [date] – Narrated TTS"

  - step: 4
    name: Log
    action: >
      Write entry to Execution Log folder (id: 1fcIrmGBV1vO-KiD3vZDFZEx4N_grS80D).
      Title: "Month DD, YYYY". Short bullet summary. Overwrite if today's entry exists.

  - step: 5
    name: Cache
    agents:
      - file: sub/cache-update.md
        name: cache-update
        description: Update today's slot in Notion Cache ring buffer with session summary

outputs:
  google_drive:
    - "Reports15 → Collection – [date]/ (all documents)"
    - "Execution Log → [date] entry (run summary)"
  notion:
    - "Admin → Cache → Row [day-of-month]"
  gmail:
    - "Drafts (email replies — never auto-sent)"

error_handling:
  - "5xx error: wait 10s, retry up to 3×, then skip and continue"
  - "If a step fails, continue — still run aggregated-report last"
  - "If a collection agent hasn't reported back after ~3 min, re-launch it"
  - "Email body stays untranslated; all summaries in English"
